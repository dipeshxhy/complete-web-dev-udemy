<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media</title>
  </head>
  <body>
    <h1>This is media learning</h1>
    <figure>
      <img
        title="dipesh"
        src="./images/me.jpg"
        width="200"
        height="200"
        alt="My photo"
      />
      <figcaption>Dipesh</figcaption>
    </figure>

    <!-- video -->
    <video
      width="320"
      height="240"
      controls
      controlsList="nodownload noremoteplayback "
    >
      <source
        src="https://www.pexels.com/download/video/32168285/"
        type="video/mp4"
      />
      Your browser does not support the video tag.
    </video>

    <!-- audio -->
    <audio controls controlsList="nodownload noremoteplayback">
      <source
        src="https://www.pexels.com/download/audio/32168285/"
        type="audio/mpeg"
      />
      Your browser does not support the audio element.
    </audio>
  </body>
</html>
