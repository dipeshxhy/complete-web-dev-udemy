<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Div</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .container {
        width: 100%;
      }
      .responsive-div {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        height: 100px;
        background-color: #4caf50;
        color: white;
        padding: 20px;
        text-align: center;
        border-radius: 8px;
        transition: all 0.3s ease;
      }

      @media (max-width: 600px) {
        body {
          align-items: start;
        }
        .responsive-div {
          background-color: #f44336;
          font-size: 14px;
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="responsive-div">
        <p>This is a responsive div.</p>
      </div>
    </div>
  </body>
</html>
