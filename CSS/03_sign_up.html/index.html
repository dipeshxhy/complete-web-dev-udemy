<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up | Sign up here</title>
    <!-- font family -->
    <link
      href="https://fonts.googleapis.com/css?family=Rubik:300,regular,500,600,700,800,900,300italic,italic,500italic,600italic,700italic,800italic,900italic"
      rel="stylesheet"
    />
    <!-- tailwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      body {
        font-family: 'Rubik', sans-serif;
      }
    </style>
  </head>
  <body class="bg-stone-900 h-screen w-screen flex items-center justify-center">
    <main class="shadow-md bg-neutral-200 p-8 rounded-md w-120">
      <h1 class="text-3xl font-bold text-center">Sign up</h1>
      <p class="text-lg text-center mb-4">Create your account</p>
      <div>
        <form action="">
          <div class="flex w-full gap-2 mb-4">
            <div class="w-full">
              <label class="text-xl font-medium" for="first-name"
                >First Name</label
              >
              <input
                class="bg-white w-full border outline-none px-1.5 py-2"
                type="text"
                id="first-name"
                name="first-name"
              />
            </div>
            <div class="w-full">
              <label class="text-xl font-medium" for="last-name"
                >Last Name</label
              >
              <input
                class="bg-white w-full border outline-none px-1.5 py-2"
                type="text"
                id="last-name"
                name="last-name"
              />
            </div>
          </div>
          <div class="flex flex-col gap-1 mb-4">
            <label class="text-xl font-medium" for="email">Email</label>
            <input
              class="bg-white w-full border outline-none px-1.5 py-2"
              type="email"
              id="email"
              name="email"
            />
          </div>
          <div class="flex flex-col gap-1 mb-4">
            <label class="text-xl font-medium" for="password">Password</label>
            <input
              class="bg-white w-full border outline-none px-1.5 py-2"
              type="password"
              id="password"
              name="password"
            />
          </div>
          <button
            type="submit"
            class="bg-green-500 w-full text-white py-4 px-4 rounded-md hover:bg-green-600 cursor-pointer transition duration-300 ease-in-out"
          >
            Sign up
          </button>
        </form>
      </div>
    </main>
  </body>
</html>
